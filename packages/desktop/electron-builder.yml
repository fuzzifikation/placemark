appId: com.placemark.desktop
productName: Placemark
directories:
  buildResources: build
  output: release
icon: ../../icon.png
electronLanguages:
  - en-US
files:
  - dist/**/*
  - dist-electron/**/*
  - build/icon.png
  - package.json
  # Sharp: exclude Linux-specific packages (not present on Windows or macOS builds)
  - '!node_modules/@img/sharp-libvips-*/**'
  - '!node_modules/@img/sharp-{linux,linuxmusl,wasm32}*/**'
  # better-sqlite3: exclude source and deps but keep the compiled Release binary
  - '!node_modules/better-sqlite3/deps/**'
  - '!node_modules/better-sqlite3/src/**'
  - '!node_modules/better-sqlite3/build/!(Release)/**'
  - '!node_modules/better-sqlite3/build/Release/!(*.node)'
# Unpack .node native binaries — they cannot be loaded from inside ASAR
asarUnpack:
  - '**/*.node'
win:
  icon: build/icons/win/icon.ico
  target:
    - target: portable
      arch: [x64]
  files:
    # Sharp: exclude non-Windows platform binaries
    - '!node_modules/@img/sharp-darwin*/**'
    - '!node_modules/@img/sharp-win32-{arm64,ia32}*/**'
portable:
  artifactName: '${productName}-${version}-portable.exe'
  splashImage: build/splash.bmp
mac:
  icon: build/icons/mac/icon.icns
  identity: null
  target:
    - target: dmg
      arch: [x64, arm64]
  files:
    # Sharp: exclude non-macOS platform binaries
    - '!node_modules/@img/sharp-win32*/**'
linux:
  target:
    - AppImage
  files:
    # Sharp: exclude non-Linux platform binaries
    - '!node_modules/@img/sharp-win32*/**'
    - '!node_modules/@img/sharp-darwin*/**'
